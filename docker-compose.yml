services:
  db:
    image: pgvector/pgvector:pg16
    container_name: how-to-tech-db
    environment:
      POSTGRES_USER: howtotech
      POSTGRES_PASSWORD: howtotech
      POSTGRES_DB: howtotech
    ports:
      - "5433:5432"
    volumes:
      - how_to_tech_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U howtotech -d howtotech"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  how_to_tech_pgdata:
