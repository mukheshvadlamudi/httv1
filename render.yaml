services:
  - type: web
    name: howtotech-api
    runtime: docker
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: ./apps/api
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false          # You'll paste this in Render dashboard
      - key: JWT_SECRET_KEY
        sync: false          # You'll paste this in Render dashboard
      - key: BACKEND_CORS_ORIGINS
        sync: false          # You'll paste your Vercel URL here after deploy
